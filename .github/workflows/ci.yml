name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

# Cancel in-flight runs on the same branch when a newer push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint & static analysis
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (black · isort · flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lint tools
        run: pip install black isort flake8

      - name: black — check formatting
        run: black --check --diff .

      - name: isort — check import order
        run: isort --check-only --diff .

      - name: flake8 — style & syntax errors
        run: |
          flake8 . \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=.git,__pycache__,notebooks,figures,outputs,checkpoints,data

  # ---------------------------------------------------------------------------
  # Unit tests (CPU only — no GPU required in CI)
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # Install CPU-only PyTorch first to keep CI image small and fast
      - name: Install PyTorch (CPU)
        run: |
          pip install torch torchvision torchaudio \
            --index-url https://download.pytorch.org/whl/cpu

      # Install remaining requirements — skip optional GPU extras
      - name: Install project dependencies
        run: |
          pip install \
            timm>=0.9.12 \
            transformers>=4.38.0 \
            peft>=0.9.0 \
            numpy>=1.24.0 \
            scipy>=1.11.0 \
            scikit-learn>=1.3.0 \
            pandas>=2.0.0 \
            matplotlib>=3.7.0 \
            seaborn>=0.12.0 \
            Pillow>=10.0.0 \
            PyYAML>=6.0 \
            tensorboard>=2.14.0 \
            tqdm>=4.66.0 \
            pytest>=7.4.0 \
            pytest-cov>=4.1.0

      # Run tests — skip DINOv2 tests that need Hub access in offline CI
      - name: Run unit tests
        env:
          HF_DATASETS_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --ignore=tests/test_models.py \
            -q

      # Run model tests separately (allows Hub access; skips gracefully if offline)
      - name: Run model tests (may skip if Hub unavailable)
        continue-on-error: true
        run: |
          pytest tests/test_models.py \
            -v \
            --tb=short \
            -q

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Demo smoke test — verify examples/run_demo.py executes on CPU
  # ---------------------------------------------------------------------------
  demo:
    name: Demo smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install torch torchvision \
            --index-url https://download.pytorch.org/whl/cpu
          pip install \
            timm>=0.9.12 \
            transformers>=4.38.0 \
            peft>=0.9.0 \
            numpy>=1.24.0 \
            Pillow>=10.0.0 \
            PyYAML>=6.0 \
            tensorboard>=2.14.0 \
            tqdm>=4.66.0

      - name: Run demo (EfficientNet only, CPU, offline)
        env:
          TRANSFORMERS_OFFLINE: "1"
        run: |
          python examples/run_demo.py \
            --model efficientnet_b3 \
            --batch_size 2 \
            --device cpu
