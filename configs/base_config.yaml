
# =============================================================================
# Base Configuration — medical-foundation-models
# =============================================================================
project:
  name: "medical-foundation-models"
  seed: 42
  device: "cuda"          # "cuda" | "cpu" | "mps"
  num_classes: 7

data:
  dataset_path: "data/HAM10000"
  metadata_file: "data/HAM10000/HAM10000_metadata.csv"
  image_size: 224
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  num_workers: 4
  pin_memory: true
  # ImageNet statistics (used for both models)
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

augmentation:
  horizontal_flip: 0.5
  vertical_flip: 0.5
  rotation_degrees: 30
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  random_erasing: 0.1

training:
  num_epochs: 50
  early_stopping_patience: 10
  early_stopping_delta: 0.001
  mixed_precision: true
  gradient_clip_norm: 1.0
  label_smoothing: 0.1

logging:
  tensorboard_dir: "outputs/tensorboard"
  checkpoint_dir: "checkpoints"
  figures_dir: "figures"
  outputs_dir: "outputs"
  log_interval: 10          # log every N batches

class_names:
  - "Actinic keratoses"     # akiec
  - "Basal cell carcinoma"  # bcc
  - "Benign keratosis"      # bkl
  - "Dermatofibroma"        # df
  - "Melanoma"              # mel
  - "Melanocytic nevi"      # nv
  - "Vascular lesions"      # vasc

class_abbreviations:
  - "akiec"
  - "bcc"
  - "bkl"
  - "df"
  - "mel"
  - "nv"
  - "vasc"
